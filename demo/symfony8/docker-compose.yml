name: workflow-bundle-demo-symfony-8

services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: workflow-symfony8-php
    working_dir: /app
    ports:
      - "${PORT:-8022}:80"
    volumes:
      - .:/app
      - ../..:/var/workflow-bundle
      - ./docker/frankenphp/Caddyfile.dev:/etc/frankenphp/Caddyfile.dev
      - ./docker/php-dev.ini:/usr/local/etc/php/conf.d/99-dev.ini:ro
      - composer-cache:/root/.composer/cache
    environment:
      COMPOSER_ALLOW_SUPERUSER: "1"
      COMPOSER_MEMORY_LIMIT: "-1"
      COMPOSER_MAX_PARALLEL_HTTP: "4"
      APP_ENV: dev
      APP_DEBUG: "1"
      APP_SECRET: ${APP_SECRET:-demo-secret}
      # Override .env localhost URL — use internal Docker network host `database`.
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=16&charset=utf8
    dns:
      - 8.8.8.8
      - 8.8.4.4
      - 1.1.1.1
      - 1.0.0.1
    mem_limit: 2g
    networks:
      - workflow-demo-network
    depends_on:
      database:
        condition: service_healthy

  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
    networks:
      - workflow-demo-network

volumes:
  database_data:
  composer-cache:

networks:
  workflow-demo-network:
    driver: bridge
